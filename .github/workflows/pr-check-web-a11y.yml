name: Web Accessibility PR Checks
on:
  pull_request:
    paths:
      - 'apps/web/**'

jobs:
  pr-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        name: checkout
      - uses: actions/cache@v4
        name: Cache yarn
        with:
          path: ./.yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('./yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-${{ hashFiles('./yarn.lock') }}

      - name: Install dependencies
        run: yarn

      - name: Build dependencies
        run: yarn build-common

      - name: Build web app
        run: yarn workspace @ehpr/web build

      - name: Start web app
        run: NEXT_PUBLIC_PREFILLED_FORM=true yarn workspace @ehpr/web start &

      - name: Wait for web app
        run: |
          for i in {1..30}; do
            if curl --silent --fail http://localhost:3000; then
              echo "App is up"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          exit 1

      - name: Accessibility Test web package
        run: make accessibility-test

      - name: generate markdown from test results
        run: make generate-accessibility-results
        if: ${{ failure() }}

      - uses: actions/github-script@v3
        if: ${{ failure() }}
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('./packages/accessibility/out/accessibility_results.md', 'utf8');
            github.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            })